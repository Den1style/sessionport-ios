name: SessionPort
options:
  bundleIdPrefix: com.sessionport
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only

targets:

  # ─── Host App ─────────────────────────────────────────────────────
  SessionPort:
    type: application
    platform: iOS
    bundleIdSuffix: app
    sources:
      - path: SessionPortApp
      - path: SessionPortCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sessionport.app
        DEVELOPMENT_TEAM: ""          # fill in your Team ID
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: SessionPortApp/App/Info.plist
    entitlements:
      path: SessionPortApp/SessionPort.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sessionport.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.sessionport.app
    dependencies:
      - sdk: StoreKit.framework
      - sdk: AuthenticationServices.framework
    scheme:
      testTargets:
        - SessionPortTests

  # ─── Keyboard Extension ───────────────────────────────────────────
  SessionPortKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SessionPortKeyboard
      - path: SessionPortCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sessionport.app.keyboard
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: SessionPortKeyboard/Info.plist
    entitlements:
      path: SessionPortKeyboard/SessionPortKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sessionport.app
        RequestsOpenAccess: true

  # ─── Unit Tests ───────────────────────────────────────────────────
  SessionPortTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SessionPortTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sessionport.app.tests
    dependencies:
      - target: SessionPort
