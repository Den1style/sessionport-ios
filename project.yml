name: SessionPort
options:
  bundleIdPrefix: com.lusine   # each target also sets PRODUCT_BUNDLE_IDENTIFIER explicitly (com.lusine.sessionport*)
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    SWIFT_STRICT_CONCURRENCY: complete    # data races → compile error
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES   # warnings → build failure

targets:

  # ─── Host App ─────────────────────────────────────────────────────
  SessionPort:
    type: application
    platform: iOS
    sources:
      - path: SessionPortApp
      - path: SessionPortCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lusine.sessionport
        DEVELOPMENT_TEAM: ""          # fill in your Team ID
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: SessionPortApp/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SessionPortApp/SessionPort.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lusine.sessionport
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.lusine.sessionport
    dependencies:
      - sdk: AuthenticationServices.framework
      - target: SessionPortKeyboard
        embed: true
        codeSign: true
    scheme:
      testTargets:
        - SessionPortTests

  # ─── Keyboard Extension ───────────────────────────────────────────
  SessionPortKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: SessionPortKeyboard
      - path: SessionPortCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lusine.sessionport.keyboard
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: SessionPortKeyboard/Info.plist
    entitlements:
      path: SessionPortKeyboard/SessionPortKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lusine.sessionport
        # Note: RequestsOpenAccess belongs in Info.plist (NSExtensionAttributes), not entitlements

  # ─── Unit Tests ───────────────────────────────────────────────────
  SessionPortTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SessionPortTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lusine.sessionport.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SessionPort
